<svg
    viewBox="0 0 100 100"
    fill="none"
    xmlns="http://www.w3.org/2000/svg">

    <defs>

        <linearGradient id="ultraGold" x1="0%" y1="100%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#4A3104"/>
            <stop offset="20%" stop-color="#A37C24"/>
            <stop offset="45%" stop-color="#D4AF37"/>
            <stop offset="55%" stop-color="#FFFDF4"/>
            <stop offset="65%" stop-color="#EAD07B"/>
            <stop offset="100%" stop-color="#8A640F"/>
        </linearGradient>

        <linearGradient id="saffronCore" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#FF6B1A"/>
            <stop offset="50%" stop-color="#E63900"/>
            <stop offset="100%" stop-color="#990000"/>
        </linearGradient>

        <filter id="ultraGlow" x="-25%" y="-25%" width="150%" height="150%">
            <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#D4AF37" flood-opacity="0.3"/>
            <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#FF5500" flood-opacity="0.1"/>
        </filter>

    </defs>

    <!-- Border Halo -->
    <g filter="url(#ultraGlow)">
        <circle
            cx="50"
            cy="50"
            r="43"
            stroke="url(#ultraGold)"
            stroke-width="1.25"
            opacity="0.85"/>

        <circle
            cx="50"
            cy="50"
            r="39"
            stroke="url(#ultraGold)"
            stroke-width="0.5"
            stroke-dasharray="2 4"
            opacity="0.4"/>
    </g>

    <!-- Main Flute -->
    <g filter="url(#ultraGlow)">

        <path
            d="M24 71 L76 29"
            stroke="url(#ultraGold)"
            stroke-width="3.5"
            stroke-linecap="round"/>

        <path
            d="M25 70.2 L75 29.8"
            stroke="#2D1E02"
            stroke-width="0.5"
            opacity="0.4"/>

        <!-- Grip Rings -->
        <path d="M29.5 68.5 L31.5 71" stroke="#3A2501" stroke-width="1"/>
        <path d="M31.5 67 L33.5 69.5" stroke="#3A2501" stroke-width="1"/>
        <path d="M68.5 37 L70.5 39.5" stroke="#3A2501" stroke-width="1"/>

        <!-- Sound Holes -->
        <circle
            cx="42"
            cy="56.5"
            r="0.8"
            fill="#1F1301"
            stroke="url(#ultraGold)"
            stroke-width="0.25"/>

        <circle
            cx="46.5"
            cy="53"
            r="0.8"
            fill="#1F1301"
            stroke="url(#ultraGold)"
            stroke-width="0.25"/>

        <circle
            cx="51"
            cy="49.5"
            r="0.8"
            fill="#1F1301"
            stroke="url(#ultraGold)"
            stroke-width="0.25"/>

        <circle
            cx="55.5"
            cy="46"
            r="0.8"
            fill="#1F1301"
            stroke="url(#ultraGold)"
            stroke-width="0.25"/>

        <circle
            cx="60"
            cy="42.5"
            r="0.8"
            fill="#1F1301"
            stroke="url(#ultraGold)"
            stroke-width="0.25"/>

        <!-- Tassel 1 -->
        <path
            d="M71.5 34.5 C72 44 68 50 68 56"
            stroke="url(#ultraGold)"
            stroke-width="0.75"
            fill="none"
            stroke-linecap="round"/>

        <circle
            cx="68"
            cy="57.5"
            r="1.5"
            fill="url(#saffronCore)"/>

        <!-- Tassel 2 -->
        <path
            d="M73 33.2 C75 45 73 53 73 60"
            stroke="url(#ultraGold)"
            stroke-width="0.75"
            fill="none"
            stroke-linecap="round"/>

        <circle
            cx="73"
            cy="61.8"
            r="1.5"
            fill="url(#ultraGold)"/>

        <path
            d="M73 63.3 L73 67"
            stroke="url(#saffronCore)"
            stroke-width="1"
            stroke-linecap="round"/>

    </g>

</svg>